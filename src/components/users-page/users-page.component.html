<section class="users-page">
  <app-users-filter [debounceMs]="300" (filter)="filterTextSubject.next($event)"/>
  <div>{{ usersCount | pluralize: 'пользователь' : 'пользователя' : 'пользователей' }}</div>
  <div class="users-card-container">
    @for (user of filteredUsers$ | async; track user.id) {
      <app-user-card
        [user]="user"
        (deleteUser)="handleDeleteUser($event)"
        gradientBorder [GradientConfiguration]="{
          delay: 1000,
          colors: ['red', 'blue', 'yellow'],
          thickness: '5px'
        }
      "/>
    }
  </div>
  <app-create-user (createUser)="handleCreateUser($event)"/>
</section>
